name: Build Original Nekogram

on:
  workflow_dispatch: # 手动触发

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          repository: 'Nekogram/Nekogram' # 直接拉取官方仓库
          submodules: recursive
          fetch-depth: 1 # 只拉取最新提交，节省空间和时间

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Install NDK
        uses: android-actions/setup-android@v3
        with:
          ndk-version: '25.2.9519653' # Nekogram 目前常用的 NDK 版本

      - name: Grant Execute Permission
        run: chmod +x gradlew

      - name: Build Arm64 Release
        # 建议先编译 arm64-v8a，速度最快且适配绝大多数现代手机
        run: ./gradlew assembleArm64-v8aRelease --stacktrace
        
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Nekogram-Arm64-v8a
          path: app/build/outputs/apk/arm64-v8a/release/*.apk
