name: Build Nekogram (JDK11 Compatibility)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          repository: 'Nekogram/Nekogram'
          submodules: recursive
          fetch-depth: 1

      - name: Set up JDK 11  # 尝试切换到兼容性更好的 JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Android NDK
        uses: android-actions/setup-android@v3
        with:
          ndk-version: '25.2.9519653'

      - name: Prepare Config
        run: |
          # 确保所有的配置文件都到位
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          echo "APP_ID=8" >> local.properties
          echo "APP_HASH=1d6f0d5888051d62ec30c613038a829e" >> local.properties
          chmod +x gradlew

      - name: Build Arm64 Debug
        # 增加 --no-daemon 模式，这在云端编译时更稳定，容易暴露真实的初段报错
        run: ./gradlew assembleArm64-v8aDebug --stacktrace --no-daemon
        env:
          APP_ID: 8
          APP_HASH: 1d6f0d5888051d62ec30c613038a829e

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Nekogram-JDK11-Build
          path: app/build/outputs/apk/arm64-v8a/debug/*.apk
