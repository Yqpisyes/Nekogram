name: Build Nekogram (Environment Fixed)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          repository: 'Nekogram/Nekogram'
          submodules: recursive
          fetch-depth: 1

      - name: Set up JDK 17 # 插件运行需要 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        # 注意：这里不再在 inputs 里传 ndk-version，防止插件报错

      - name: Install NDK via SDKManager
        # 手动调用 sdkmanager 安装 NDK，这样最稳妥
        run: |
          echo "y" | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --install "ndk;25.2.9519653"

      - name: Prepare Config
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          echo "ndk.dir=$ANDROID_SDK_ROOT/ndk/25.2.9519653" >> local.properties
          echo "APP_ID=8" >> local.properties
          echo "APP_HASH=1d6f0d5888051d62ec30c613038a829e" >> local.properties
          chmod +x gradlew

      - name: Build Arm64 Debug
        # 强制 Gradle 在编译时向下兼容，并跳过一些严格的 JDK 检查
        run: ./gradlew assembleArm64-v8aDebug --stacktrace --no-daemon -Dorg.gradle.java.home=${{ env.JAVA_HOME }}
        env:
          APP_ID: 8
          APP_HASH: 1d6f0d5888051d62ec30c613038a829e

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Nekogram-Final-Build
          path: app/build/outputs/apk/arm64-v8a/debug/*.apk
